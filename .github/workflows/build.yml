name: Build

# Mirrors the VCV Library build farm (rack-plugin-toolchain):
#   - Windows and Linux are cross-compiled inside the toolchain Docker image,
#     exactly as the farm does (make plugin-build-<platform>).
#   - macOS is built natively on a mac runner, because Apple's SDK cannot be
#     redistributed in a public toolchain image.
# This produces the same four .vcvplugin artifacts (mac-x64, mac-arm64, win-x64,
# lin-x64) the farm publishes. The `provisioning-check` job is an extra, fast
# native build that verifies `make dep` self-provisions the opc + WDL + pffft
# submodules (the path the farm relies on when it does not pre-init nested submodules).

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

# Pin the Rack SDK. vcvrack.com's `latest` alias currently redirects to a mac
# SDK build that returns 404; this version is verified present for all platforms.
env:
  RACK_SDK_VERSION: "2.5.2"

defaults:
  run:
    shell: bash

jobs:
  # Fast feedback + validates self-provisioning: no submodules are checked out,
  # so `make dep` must initialise opc and its WDL + pffft dependencies itself. Not a
  # farm-exact build (native ubuntu toolchain), so it is not shipped.
  provisioning-check:
    name: Provisioning check (lin-x64, native)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4

      - name: Get Rack SDK
        run: |
          wget -q "https://vcvrack.com/downloads/Rack-SDK-${RACK_SDK_VERSION}-lin-x64.zip"
          unzip -q "Rack-SDK-${RACK_SDK_VERSION}-lin-x64.zip" -d "$HOME"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zstd libglu1-mesa-dev \
            libx11-dev libxext-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev zlib1g-dev

      - name: Build (from repo root, as the farm invokes it)
        run: |
          export RACK_DIR="$HOME/Rack-SDK"
          make clean
          make cleandep
          make dep
          make dist
          ls -l dist/*.vcvplugin

  # Farm-exact: Windows and Linux via the rack-plugin-toolchain Docker image.
  build:
    name: ${{ matrix.platform }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qno/rack-plugin-toolchain-win-linux
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        platform: [ win-x64, lin-x64 ]
    steps:
      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build plugin
        run: |
          export PLUGIN_DIR="$GITHUB_WORKSPACE"
          pushd /home/build/rack-plugin-toolchain
          make plugin-build-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: /home/build/rack-plugin-toolchain/plugin-build/*.vcvplugin

  # Farm-exact: macOS built natively; CROSS_COMPILE selects the target arch.
  build-mac:
    name: mac-${{ matrix.platform }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [ x64, arm64 ]
    steps:
      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get Rack SDK
        run: |
          pushd "$HOME"
          wget -q -O Rack-SDK.zip "https://vcvrack.com/downloads/Rack-SDK-${RACK_SDK_VERSION}-mac-x64+arm64.zip"
          unzip -q Rack-SDK.zip

      - name: Build plugin
        run: |
          CROSS_COMPILE_TARGET_x64=x86_64-apple-darwin
          CROSS_COMPILE_TARGET_arm64=arm64-apple-darwin
          export RACK_DIR="$HOME/Rack-SDK"
          export CROSS_COMPILE=$CROSS_COMPILE_TARGET_${{ matrix.platform }}
          make dep
          make dist
          ls -l dist/*.vcvplugin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.platform }}
          path: dist/*.vcvplugin

  # On a v* tag, attach all four artifacts to a GitHub Release.
  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [ build, build-mac ]
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin.json version matches the tag
        run: |
          version=$(jq -r '.version' plugin.json)
          if [ "v$version" != "${GITHUB_REF_NAME}" ]; then
            echo "plugin.json version 'v$version' does not match tag '${GITHUB_REF_NAME}'"
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: _artifacts/**/*.vcvplugin
